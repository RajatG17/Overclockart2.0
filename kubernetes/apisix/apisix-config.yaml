apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-config
data:
  apisix.yaml: |
    routes:
      # Auth Service (No auth required for login/register)
      - uri: /auth/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/auth/(.*)", "/$1"]
        upstream:
          nodes:
            "auth:8000": 1
          type: roundrobin
          
      # Catalog Service (Requires Auth)
      - uri: /catalog/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/catalog/(.*)", "/$1"]
          forward-auth:
            uri: http://auth:8000/verify
            request_headers: ["Authorization"]
            upstream_headers: ["email"]
            client_headers: ["email"]
        upstream:
          nodes:
            "catalog:8000": 1
          type: roundrobin
          
      # Order Service (Requires Auth)
      - uri: /orders/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/orders/(.*)", "/$1"]
          forward-auth:
            uri: http://auth:8000/verify
            request_headers: ["Authorization"]
            upstream_headers: ["email"]
            client_headers: ["email"]
        upstream:
          nodes:
            "order:8000": 1
          type: roundrobin
          
      # Payment Webhook (No auth required, uses Stripe signature)
      - uri: /payment/webhook
        plugins:
          proxy-rewrite:
            regex_uri: ["^/payment/(.*)", "/$1"]
        upstream:
          nodes:
            "payment:8000": 1
          type: roundrobin
    # Config schema reference
    # https://apisix.apache.org/docs/apisix/stand-alone/
