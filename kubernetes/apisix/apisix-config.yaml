apiVersion: v1
kind: ConfigMap
metadata:
  name: apisix-config
data:
  apisix.yaml: |
    routes:
      # Auth Service (No auth required for login/register)
      - id: 1
        uri: /auth/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/auth/(.*)", "/$1"]
        upstream:
          nodes:
            "auth-service:8000": 1
          type: roundrobin
          
      # Catalog Service (Requires Auth)
      - id: 2
        uri: /catalog/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/catalog/(.*)", "/$1"]
          forward-auth:
            uri: http://auth-service:8000/verify
            request_headers: ["Authorization"]
            upstream_headers: ["email"]
            client_headers: ["email"]
        upstream:
          nodes:
            "catalog-service:8000": 1
          type: roundrobin
          
      # Order Service (Requires Auth)
      - id: 3
        uri: /orders/*
        plugins:
          proxy-rewrite:
            regex_uri: ["^/orders/(.*)", "/$1"]
          forward-auth:
            uri: http://auth-service:8000/verify
            request_headers: ["Authorization"]
            upstream_headers: ["email"]
            client_headers: ["email"]
        upstream:
          nodes:
            "order-service:8000": 1
          type: roundrobin
          
      # Payment Webhook (No auth required, uses Stripe signature)
      - id: 4
        uri: /payment/webhook
        plugins:
          proxy-rewrite:
            regex_uri: ["^/payment/(.*)", "/$1"]
        upstream:
          nodes:
            "payment-service:8000": 1
          type: roundrobin
    #END
