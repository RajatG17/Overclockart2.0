apiVersion: apps/v1
kind: Deployment
metadata:
  name: apisix
spec:
  selector:
    matchLabels:
      app: apisix
  template:
    metadata:
      labels:
        app: apisix
    spec:
      containers:
      - name: apisix
        image: apache/apisix:3.6.0-debian
        env:
        - name: APISIX_STAND_ALONE
          value: "true"
        ports:
        - containerPort: 9080
        volumeMounts:
        - name: apisix-config-volume
          mountPath: /usr/local/apisix/conf/apisix.yaml
          subPath: apisix.yaml
      volumes:
      - name: apisix-config-volume
        configMap:
          name: apisix-config
---
apiVersion: v1
kind: Service
metadata:
  name: apisix-gateway
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 9080
    nodePort: 30080
  selector:
    app: apisix
